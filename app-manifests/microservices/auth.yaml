apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-app-auth
  labels:
    app: go-microservices-dm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-app
  template:
    metadata:
      labels:
        app: go-app
    spec:
      containers:
        - name: auth
          image: 586050444726.dkr.ecr.eu-central-1.amazonaws.com/go-auth-service:latest
          env:
            - name: DB_URL
              value: host=db-service user=service password=8590 dbname=auth_svc port=5432
          ports:
            - containerPort: 50051

          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "100Mi"
              cpu: "500m"

          livenessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 15  
            periodSeconds: 10
            failureThreshold: 3  
          readinessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 15
            periodSeconds: 5  
            failureThreshold: 3
